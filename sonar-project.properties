sonar.projectKey=silviobeer_beerengineer
sonar.organization=silviobeer
sonar.sources=apps
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Excluded from analysis entirely. The SDK adapter trio is intentionally
# narrow vendor-SDK glue — their behavior is verified by the opt-in live
# smoke (gated on BEERENGINEER_SDK_LIVE=1, not run in CI), so generic static
# analysis on them produces noise without acting on real bugs.
#
# `**/.beerengineer/**` is the engine's per-workspace artefact / worktree
# folder. Gitignored, so CI never sees it; this exclusion belt-and-braces
# local sonar runs against a dev-machine tree where the folder exists.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/.beerengineer/**,apps/engine/src/llm/hosted/providers/claudeSdk.ts,apps/engine/src/llm/hosted/providers/codexSdk.ts,apps/engine/src/llm/hosted/providers/_sdkSession.ts

# The live SDK smoke is gated on BEERENGINEER_SDK_LIVE=1 and skipped by
# default. Excluding it from the test inventory keeps the coverage gate
# honest — we don't want green coverage that depends on tests CI never runs.
sonar.test.exclusions=apps/engine/test/sdkLive.test.ts

# Belt-and-braces: even if the SDK adapters re-enter Sonar's scope later,
# don't gate coverage on them. Real verification lives in sdkLive.test.ts.
sonar.coverage.exclusions=apps/engine/src/llm/hosted/providers/claudeSdk.ts,apps/engine/src/llm/hosted/providers/codexSdk.ts,apps/engine/src/llm/hosted/providers/_sdkSession.ts

sonar.javascript.lcov.reportPaths=coverage/engine/lcov.info,coverage/ui/lcov.info
