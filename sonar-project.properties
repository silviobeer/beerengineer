# SonarCloud project configuration
# https://sonarcloud.io — fill in your organization and project key below

sonar.organization=silviobeer
sonar.projectKey=silviobeer_beerengineer
sonar.projectName=BeerEngineer
sonar.projectVersion=0.1.0

# Source and test roots
sonar.sources=src
sonar.tests=test

# Language
sonar.language=ts

# Coverage — vitest writes lcov when run with: vitest run --coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ── Exclude from analysis ────────────────────────────────────────────────────

sonar.exclusions=\
  # Drizzle schema — pure table/column definitions, no business logic \
  src/persistence/schema.ts,\
  # Migration registry — append-only SQL/DDL data \
  src/persistence/migration-registry.ts,\
  # DB tool scripts — thin CLI wrappers, no logic \
  src/persistence/migrate.ts,\
  src/persistence/check-db.ts,\
  # CLI index barrel \
  src/cli/index.ts,\
  # Domain type declarations — interfaces and enums only \
  src/domain/types.ts,\
  # Schema index barrel \
  src/schemas/index.ts,\
  # Compiled output \
  dist/**,\
  # Build/utility scripts \
  scripts/**,\
  # Test fixtures and stubs \
  test/fixtures/**

# ── Exclude from coverage measurement ───────────────────────────────────────

sonar.coverage.exclusions=\
  # Same generated/config files excluded from analysis \
  src/persistence/schema.ts,\
  src/persistence/migration-registry.ts,\
  src/persistence/migrate.ts,\
  src/persistence/check-db.ts,\
  src/cli/index.ts,\
  src/domain/types.ts,\
  src/schemas/index.ts,\
  # CLI entry point — integration-tested via e2e, not unit-covered \
  src/cli/main.ts,\
  # App wiring — DI container, no logic \
  src/app-context.ts,\
  dist/**,\
  scripts/**,\
  test/fixtures/**

# ── Duplication exclusions ───────────────────────────────────────────────────

sonar.cpd.exclusions=\
  src/persistence/migration-registry.ts,\
  src/persistence/schema.ts
