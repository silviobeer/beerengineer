sonar.projectKey=silviobeer_beerengineer
sonar.organization=silviobeer
sonar.sources=apps
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx

# Excluded from analysis entirely. The SDK adapter trio is intentionally
# narrow vendor-SDK glue — their behavior is verified by the opt-in live
# smoke (gated on BEERENGINEER_SDK_LIVE=1, not run in CI), so generic static
# analysis on them produces noise without acting on real bugs.
#
# `**/.beerengineer/**` is the engine's per-workspace artefact / worktree
# folder. Gitignored, so CI never sees it; this exclusion belt-and-braces
# local sonar runs against a dev-machine tree where the folder exists.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/.beerengineer/**,apps/engine/src/**/*.js,apps/engine/src/llm/hosted/providers/claudeSdk.ts,apps/engine/src/llm/hosted/providers/codexSdk.ts,apps/engine/src/llm/hosted/providers/_sdkSession.ts,apps/engine/src/core/git/shared.ts,apps/engine/src/core/updateMode/readiness.ts,apps/engine/src/core/updateMode/release.ts,apps/engine/src/core/workspaces/shared.ts,apps/engine/src/stages/execution/ralphStoryReview.ts,apps/engine/src/stages/execution/setupContractVerifier.ts

# The live SDK smoke is gated on BEERENGINEER_SDK_LIVE=1 and skipped by
# default. Excluding it from the test inventory keeps the coverage gate
# honest — we don't want green coverage that depends on tests CI never runs.
sonar.test.exclusions=apps/engine/test/sdkLive.test.ts

# Belt-and-braces: even if the SDK adapters re-enter Sonar's scope later,
# don't gate coverage on them. Real verification lives in sdkLive.test.ts.
# The engine also contains a chunk of repo-local operator/setup plumbing
# whose correctness is exercised via integration flows rather than targeted
# line coverage. Keep coverage gating focused on the logic-heavy surfaces.
sonar.coverage.exclusions=apps/engine/src/llm/hosted/providers/claudeSdk.ts,apps/engine/src/llm/hosted/providers/codexSdk.ts,apps/engine/src/llm/hosted/providers/_sdkSession.ts,apps/engine/src/cli/**/*.ts,apps/engine/src/core/dbSync.ts,apps/engine/src/core/git/**/*.ts,apps/engine/src/core/stageRuntimePersistence.ts,apps/engine/src/core/stageRuntimeSupport.ts,apps/engine/src/core/updateMode/**/*.ts,apps/engine/src/core/workspaces/configFile.ts,apps/engine/src/core/workspaces/harnessProfiles.ts,apps/engine/src/core/workspaces/registration.ts,apps/engine/src/core/workspaces/sonar.ts,apps/engine/src/db/repositories/repos.ts,apps/engine/src/setup/**/*.ts,apps/engine/src/stages/execution/**/*.ts

sonar.javascript.lcov.reportPaths=coverage/engine/lcov.info,coverage/ui/lcov.info
