<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 980" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-merge" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <style><![CDATA[
      .title { font-size: 22px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 12px; fill: #64748b; }
      .section { font-size: 14px; font-weight: 600; fill: #0f172a; }
      .card-bg { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .card-bg-ui { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.5; }
      .card-title { font-weight: 700; fill: #0f172a; font-size: 12px; }
      .card-meta { font-size: 10px; fill: #64748b; }
      .stage-llm { fill: #2563eb; }
      .review-llm { fill: #93c5fd; }
      .coder-llm { fill: #7c3aed; }
      .llm-text { fill: #ffffff; font-size: 10px; font-weight: 600; text-anchor: middle; }
      .review-text { fill: #1e3a8a; font-size: 10px; font-weight: 600; text-anchor: middle; }
      .arrow { stroke: #334155; stroke-width: 1.6; fill: none; }
      .merge-arrow { stroke: #16a34a; stroke-width: 1.6; fill: none; }
      .git-master { fill: #0f172a; stroke: #0f172a; }
      .git-branch { fill: #1d4ed8; stroke: #1d4ed8; }
      .git-line { stroke: #1d4ed8; stroke-width: 2; fill: none; }
      .git-merge-line { stroke: #16a34a; stroke-width: 1.4; fill: none; stroke-dasharray: 4 3; }
      .mono { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; }
      .legend-box { stroke: #cbd5e1; fill: #ffffff; }
      .note { font-size: 10px; fill: #475569; }
      .pill { fill: #e2e8f0; }
      .pill-text { font-size: 9px; fill: #334155; font-weight: 600; }
    ]]></style>
  </defs>

  <!-- Header -->
  <text x="40" y="40" class="title">beerengineer_ — Pipeline &amp; Git-Strategie</text>
  <text x="40" y="60" class="subtitle">Stage-LLM (oben) · Review-LLM (unten) · Branch-Hierarchie unten</text>

  <!-- ============ ITEM-LEVEL ROW ============ -->
  <text x="40" y="100" class="section">Item-Level (1× pro Run)</text>
  <text x="40" y="116" class="note">Item-Concept &amp; UI-Vorbereitung. Visual-Companion + Frontend-Design nur wenn projects[*].hasUi === true.</text>

  <!-- brainstorm -->
  <g transform="translate(40,135)">
    <rect width="220" height="110" rx="8" class="card-bg"/>
    <text x="110" y="20" class="card-title" text-anchor="middle">brainstorm</text>
    <text x="110" y="34" class="card-meta" text-anchor="middle">concept.json · projects.json</text>
    <rect x="20" y="45" width="180" height="22" rx="4" class="stage-llm"/>
    <text x="110" y="60" class="llm-text">Stage-LLM (Brainstorm)</text>
    <rect x="20" y="73" width="180" height="22" rx="4" class="review-llm"/>
    <text x="110" y="88" class="review-text">Review-LLM · max 2</text>
  </g>

  <!-- visual-companion -->
  <g transform="translate(290,135)">
    <rect width="220" height="110" rx="8" class="card-bg-ui"/>
    <text x="110" y="20" class="card-title" text-anchor="middle">visual-companion</text>
    <text x="110" y="34" class="card-meta" text-anchor="middle">wireframes.json · UI-only</text>
    <rect x="20" y="45" width="180" height="22" rx="4" class="stage-llm"/>
    <text x="110" y="60" class="llm-text">Stage-LLM (no-tools)</text>
    <rect x="20" y="73" width="180" height="22" rx="4" class="review-llm"/>
    <text x="110" y="88" class="review-text">Review-LLM</text>
  </g>

  <!-- frontend-design -->
  <g transform="translate(540,135)">
    <rect width="220" height="110" rx="8" class="card-bg-ui"/>
    <text x="110" y="20" class="card-title" text-anchor="middle">frontend-design</text>
    <text x="110" y="34" class="card-meta" text-anchor="middle">design.json · UI-only</text>
    <rect x="20" y="45" width="180" height="22" rx="4" class="stage-llm"/>
    <text x="110" y="60" class="llm-text">Stage-LLM (no-tools)</text>
    <rect x="20" y="73" width="180" height="22" rx="4" class="review-llm"/>
    <text x="110" y="88" class="review-text">Review-LLM</text>
  </g>

  <!-- prepared-import shortcut callout -->
  <g transform="translate(790,135)">
    <rect width="490" height="110" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="245" y="22" class="card-title" text-anchor="middle">⤳ Shortcut: Prepared-Import</text>
    <text x="245" y="40" class="note" text-anchor="middle">CLI: beerengineer item import-prepared &lt;sourceDir&gt;</text>
    <text x="245" y="56" class="note" text-anchor="middle">Schreibt brainstorm/concept|projects.json + requirements/prd.&lt;projectId&gt;.json</text>
    <text x="245" y="72" class="note" text-anchor="middle">Setzt resume.skipDesignPrep = true → wireframes/design bleiben undefined</text>
    <text x="245" y="92" class="note" text-anchor="middle" font-style="italic">Springt direkt in den Project-Loop (start: requirements oder architecture)</text>
  </g>

  <!-- arrows row 1 -->
  <line x1="260" y1="190" x2="290" y2="190" class="arrow" marker-end="url(#arrow)"/>
  <line x1="510" y1="190" x2="540" y2="190" class="arrow" marker-end="url(#arrow)"/>

  <!-- transition to row 2 -->
  <path d="M 760 245 Q 760 280 660 280" class="arrow" fill="none" marker-end="url(#arrow)"/>
  <text x="690" y="270" class="note">in Project-Loop</text>

  <!-- shortcut arrow into project loop -->
  <path d="M 1035 245 Q 1035 305 380 305" class="merge-arrow" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow-merge)"/>
  <text x="900" y="295" class="note" fill="#15803d">prepared-import → requirements oder architecture</text>

  <!-- ============ PROJECT-LEVEL ROW ============ -->
  <text x="40" y="345" class="section">Per-Project-Level (Loop über projects[])</text>
  <text x="40" y="361" class="note">Jedes Projekt durchläuft seine eigenen Stages. ctx wird inkrementell angereichert (WithPrd → WithArchitecture → WithPlan → …).</text>

  <!-- requirements -->
  <g transform="translate(40,380)">
    <rect width="160" height="110" rx="8" class="card-bg"/>
    <text x="80" y="20" class="card-title" text-anchor="middle">requirements</text>
    <text x="80" y="34" class="card-meta" text-anchor="middle">prd.&lt;projectId&gt;.json</text>
    <rect x="15" y="45" width="130" height="22" rx="4" class="stage-llm"/>
    <text x="80" y="60" class="llm-text">Stage-LLM</text>
    <rect x="15" y="73" width="130" height="22" rx="4" class="review-llm"/>
    <text x="80" y="88" class="review-text">Review-LLM</text>
  </g>

  <!-- architecture -->
  <g transform="translate(220,380)">
    <rect width="160" height="110" rx="8" class="card-bg"/>
    <text x="80" y="20" class="card-title" text-anchor="middle">architecture</text>
    <text x="80" y="34" class="card-meta" text-anchor="middle">architecture.json</text>
    <rect x="15" y="45" width="130" height="22" rx="4" class="stage-llm"/>
    <text x="80" y="60" class="llm-text">Stage-LLM</text>
    <rect x="15" y="73" width="130" height="22" rx="4" class="review-llm"/>
    <text x="80" y="88" class="review-text">Review-LLM · max 4</text>
  </g>

  <!-- planning -->
  <g transform="translate(400,380)">
    <rect width="160" height="110" rx="8" class="card-bg"/>
    <text x="80" y="20" class="card-title" text-anchor="middle">planning</text>
    <text x="80" y="34" class="card-meta" text-anchor="middle">plan.json (waves)</text>
    <rect x="15" y="45" width="130" height="22" rx="4" class="stage-llm"/>
    <text x="80" y="60" class="llm-text">Stage-LLM</text>
    <rect x="15" y="73" width="130" height="22" rx="4" class="review-llm"/>
    <text x="80" y="88" class="review-text">Review-LLM (validating)</text>
  </g>

  <!-- execution (extra wide) -->
  <g transform="translate(580,380)">
    <rect width="320" height="200" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="160" y="20" class="card-title" text-anchor="middle">execution — Wave/Story Loop</text>
    <text x="160" y="36" class="card-meta" text-anchor="middle">wave-summary.json · implementation.json · test-plan.json</text>

    <!-- Wave loop label -->
    <rect x="14" y="46" width="60" height="14" rx="3" class="pill"/>
    <text x="44" y="56" class="pill-text" text-anchor="middle">PRO WAVE</text>
    <rect x="80" y="46" width="58" height="14" rx="3" class="pill"/>
    <text x="109" y="56" class="pill-text" text-anchor="middle">PRO STORY</text>

    <!-- TestWriter Stage-LLM -->
    <rect x="14" y="68" width="290" height="22" rx="4" class="stage-llm"/>
    <text x="159" y="83" class="llm-text">① Stage-LLM · TestWriter → test-plan.json</text>

    <!-- Ralph loop: Coder + Reviewer -->
    <rect x="14" y="98" width="290" height="22" rx="4" class="coder-llm"/>
    <text x="159" y="113" class="llm-text">② Coder-LLM · Ralph-Loop (executionCoder)</text>

    <rect x="14" y="125" width="290" height="22" rx="4" class="review-llm"/>
    <text x="159" y="140" class="review-text">③ Review-LLM · story-review · cycle ↻</text>

    <text x="160" y="160" class="note" text-anchor="middle">Coder ⇄ Reviewer bis pass / max-cycles</text>
    <text x="160" y="175" class="note" text-anchor="middle">Merge-Resolver-LLM beim Story→Wave-Merge (gleiches Modell wie Coder)</text>
    <text x="160" y="190" class="note" text-anchor="middle" font-style="italic">Setup-Wave: nur Coder, keine TestWriter-Stage</text>
  </g>

  <!-- project-review -->
  <g transform="translate(920,380)">
    <rect width="160" height="110" rx="8" class="card-bg"/>
    <text x="80" y="20" class="card-title" text-anchor="middle">project-review</text>
    <text x="80" y="34" class="card-meta" text-anchor="middle">project-review.json</text>
    <rect x="15" y="45" width="130" height="22" rx="4" class="stage-llm"/>
    <text x="80" y="60" class="llm-text">Stage-LLM</text>
    <rect x="15" y="73" width="130" height="22" rx="4" class="review-llm"/>
    <text x="80" y="88" class="review-text">Review-LLM</text>
  </g>

  <!-- qa -->
  <g transform="translate(1100,380)">
    <rect width="100" height="110" rx="8" class="card-bg"/>
    <text x="50" y="20" class="card-title" text-anchor="middle">qa</text>
    <text x="50" y="34" class="card-meta" text-anchor="middle">no artifact</text>
    <rect x="10" y="45" width="80" height="22" rx="4" class="stage-llm"/>
    <text x="50" y="60" class="llm-text">Stage-LLM</text>
    <rect x="10" y="73" width="80" height="22" rx="4" class="review-llm"/>
    <text x="50" y="88" class="review-text">Review-LLM</text>
  </g>

  <!-- documentation -->
  <g transform="translate(1210,380)">
    <rect width="90" height="110" rx="8" class="card-bg"/>
    <text x="45" y="20" class="card-title" text-anchor="middle">docs</text>
    <text x="45" y="34" class="card-meta" text-anchor="middle">documentation.json</text>
    <rect x="8" y="45" width="74" height="22" rx="4" class="stage-llm"/>
    <text x="45" y="60" class="llm-text">Stage</text>
    <rect x="8" y="73" width="74" height="22" rx="4" class="review-llm"/>
    <text x="45" y="88" class="review-text">Review</text>
  </g>

  <!-- arrows row 2 -->
  <line x1="200" y1="435" x2="220" y2="435" class="arrow" marker-end="url(#arrow)"/>
  <line x1="380" y1="435" x2="400" y2="435" class="arrow" marker-end="url(#arrow)"/>
  <line x1="560" y1="435" x2="580" y2="435" class="arrow" marker-end="url(#arrow)"/>
  <line x1="900" y1="435" x2="920" y2="435" class="arrow" marker-end="url(#arrow)"/>
  <line x1="1080" y1="435" x2="1100" y2="435" class="arrow" marker-end="url(#arrow)"/>
  <line x1="1200" y1="435" x2="1210" y2="435" class="arrow" marker-end="url(#arrow)"/>

  <!-- ============ GIT STRATEGY ============ -->
  <text x="40" y="640" class="section">Git-Strategie — real-git only, eine Worktree pro Story</text>
  <text x="40" y="656" class="note">Branches werden Top-Down erzeugt. Merges laufen Bottom-Up. Blocked Story → abandonStoryBranch (kein Merge in Wave).</text>

  <!-- Tree visualization -->
  <g transform="translate(60,680)">
    <!-- master -->
    <circle cx="0" cy="20" r="6" class="git-master"/>
    <text x="14" y="24" class="mono" font-weight="700">master / base</text>
    <text x="180" y="24" class="note">⟵ Workspace-Root, nie direkt beschrieben</text>

    <!-- item -->
    <line x1="0" y1="26" x2="0" y2="60" class="git-line"/>
    <line x1="0" y1="60" x2="40" y2="60" class="git-line"/>
    <circle cx="40" cy="60" r="6" class="git-branch"/>
    <text x="54" y="64" class="mono">feat/&lt;item-slug&gt;</text>
    <text x="240" y="64" class="note">⟵ ensureItemBranch() — beim Workflow-Start (workflow.ts:330)</text>

    <!-- project -->
    <line x1="40" y1="66" x2="40" y2="100" class="git-line"/>
    <line x1="40" y1="100" x2="80" y2="100" class="git-line"/>
    <circle cx="80" cy="100" r="6" class="git-branch"/>
    <text x="94" y="104" class="mono">feat/&lt;item&gt;/&lt;projectId&gt;</text>
    <text x="280" y="104" class="note">⟵ ensureProjectBranch() — pro Projekt vor requirements</text>

    <!-- wave -->
    <line x1="80" y1="106" x2="80" y2="140" class="git-line"/>
    <line x1="80" y1="140" x2="120" y2="140" class="git-line"/>
    <circle cx="120" cy="140" r="6" class="git-branch"/>
    <text x="134" y="144" class="mono">feat/&lt;item&gt;/&lt;proj&gt;/wave-&lt;n&gt;</text>
    <text x="340" y="144" class="note">⟵ ensureWaveBranch() — pro Wave in der Execution</text>

    <!-- story / worktree -->
    <line x1="120" y1="146" x2="120" y2="180" class="git-line"/>
    <line x1="120" y1="180" x2="160" y2="180" class="git-line"/>
    <circle cx="160" cy="180" r="6" class="git-branch"/>
    <text x="174" y="184" class="mono">feat/&lt;item&gt;/&lt;proj&gt;/wave-&lt;n&gt;/&lt;storyId&gt;</text>
    <text x="430" y="184" class="note">⟵ ensureStoryWorktree() — eigene Working-Copy &amp; Port pro Story (parallelisierbar)</text>
  </g>

  <!-- Merge flow -->
  <g transform="translate(720,680)">
    <rect width="540" height="220" rx="8" class="legend-box"/>
    <text x="20" y="24" class="section">Merge-Richtung (bottom-up)</text>

    <text x="20" y="55" class="mono">story-branch  ──┐</text>
    <text x="270" y="55" class="note">mergeStoryIntoWave() · Coder-Resolver bei Konflikten</text>

    <text x="20" y="80" class="mono">              ▼</text>
    <text x="20" y="100" class="mono">wave-branch   ──┐</text>
    <text x="270" y="100" class="note">mergeWaveIntoProject() · alle Stories der Wave gepasst</text>

    <text x="20" y="125" class="mono">              ▼</text>
    <text x="20" y="145" class="mono">project-branch ─┐</text>
    <text x="270" y="145" class="note">mergeProjectIntoItem() · nach project-review + qa + docs</text>

    <text x="20" y="170" class="mono">              ▼</text>
    <text x="20" y="190" class="mono">item-branch    ─┐</text>
    <text x="270" y="190" class="note">mergeItemIntoBase() · Merge-Gate / Handoff-Phase</text>

    <text x="20" y="210" class="mono">              ▼</text>
    <text x="120" y="210" class="mono" font-weight="700">master / base</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(40,920)">
    <rect width="20" height="14" rx="3" class="stage-llm"/>
    <text x="28" y="11" class="note">Stage-LLM (Worker)</text>

    <rect x="160" width="20" height="14" rx="3" class="review-llm"/>
    <text x="188" y="11" class="note">Review-LLM (Reviewer)</text>

    <rect x="320" width="20" height="14" rx="3" class="coder-llm"/>
    <text x="348" y="11" class="note">Coder-LLM (Ralph executionCoder)</text>

    <rect x="540" width="20" height="14" rx="3" class="card-bg-ui"/>
    <text x="568" y="11" class="note">UI-only Stage (entfällt bei !hasUi)</text>

    <rect x="780" width="20" height="14" rx="3" fill="#ecfdf5" stroke="#10b981"/>
    <text x="808" y="11" class="note">Prepared-Import Bypass</text>

    <line x1="940" y1="7" x2="970" y2="7" class="merge-arrow" stroke-dasharray="4 3" marker-end="url(#arrow-merge)"/>
    <text x="978" y="11" class="note">Merge / Bypass-Pfad</text>
  </g>
</svg>
